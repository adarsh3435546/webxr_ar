<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Viewer</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- Orbit Controls -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene background="color: #ECECEC">

  <!-- Camera with orbit controls -->
  <a-entity 
    camera 
    position="0 1.5 3"
    orbit-controls="
      target: 0 0.5 0;
      enableDamping: true;
      dampingFactor: 0.1;
      rotateSpeed: 0.3">
  </a-entity>

  <!-- Lighting -->
  <a-entity light="type: ambient; intensity: 0.8"></a-entity>
  <a-entity light="type: directional; intensity: 1" position="2 4 2"></a-entity>

  <!-- Ground -->
  <a-plane 
    rotation="-90 0 0" 
    width="10" 
    height="10" 
    color="#ccc">
  </a-plane>

  <!-- Your Car Model -->
  <a-entity
    id="car"
    gltf-model="./  the_amazing_spiderman.glb"
    position="0 0 0"
    scale="0.3 0.3 0.3">
  </a-entity>

</a-scene>

</body>
</html>
